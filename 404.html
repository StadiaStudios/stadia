<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #111;
            color: #fff;
            min-height: 100vh;
            min-width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
            z-index: 1;
            width: 100%;
            max-width: 100vw;
        }

        .mb-8 { margin-bottom: 2rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-10 { margin-bottom: 2.5rem; }

        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #111 70%);
            z-index: -1;
            pointer-events: none;
        }

        .particles {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            opacity: 0.3;
            pointer-events: none;
        }

        .flex { display: flex; }
        .justify-center { justify-content: center; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .gap-4 { gap: 1rem; }

        .border {
            border-width: 1px;
            border-style: solid;
        }
        .border-white10 {
            border-color: rgba(255,255,255,0.10);
        }

        .caution-circle {
            width: 6rem;
            height: 6rem;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.10);
            margin: 0 auto;
        }

        .caution-svg {
            width: 3rem;
            height: 3rem;
            color: #9CA3AF;
            display: block;
        }

        .title-404 {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: -0.04em;
            color: #fff;
            margin-bottom: 1rem;
        }
        @media (max-width: 500px) {
            .title-404 { font-size: 2.5rem; }
        }

        .subtitle {
            font-size: 1.25rem;
            color: #9CA3AF;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .desc {
            font-size: 0.93rem;
            color: #6B7280;
            margin-bottom: 2.5rem;
            max-width: 24rem;
            margin-left: auto;
            margin-right: auto;
            font-weight: 400;
        }

        .ps5-button {
            position: relative;
            background: #222;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 2px solid transparent;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            padding: 0.75rem 2.5rem;
            border-radius: 999px;
            color: #fff;
            font-size: 1.125rem;
            font-weight: 500;
            min-width: 160px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            outline: none;
        }
        .ps5-button:hover, .ps5-button:focus {
            background: #333;
            transform: scale(1.05);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .ps5-button:active {
            transform: scale(0.98);
        }

        .ps5-button-icon {
            width: 1.25rem;
            height: 1.25rem;
            opacity: 0.7;
            display: inline-block;
        }
        .rounded-full { border-radius: 999px; }

        .under-btn-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.19em;
            color: #4B5563;
            margin-top: 1rem;
        }

        .font-light { font-weight: 300; }
        .font-medium { font-weight: 500; }
        .tracking-tighter { letter-spacing: -0.04em; }
        .tracking-widest { letter-spacing: 0.195em; }
    </style>
</head>
<body>

    <div class="particles"></div>
    <div class="bg-glow"></div>

    <div class="main-container">
        <div class="mb-8 flex justify-center">
            <span class="caution-circle">
                <svg xmlns="http://www.w3.org/2000/svg" class="caution-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </span>
        </div>

        <h1 class="title-404 font-light tracking-tighter mb-4">404</h1>
        <p class="subtitle mb-2 font-medium">Something went wrong.</p>
        <p class="desc mb-10">
            The content you are looking for cannot be found. Check the URL or return to the main dashboard.
        </p>
        
        <div class="flex flex-col items-center gap-4">
            <a href="index.html" class="ps5-button rounded-full font-medium">
                <span>Return Home</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="ps5-button-icon" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </a>
            
            <p class="under-btn-label tracking-widest mt-4">Press button to navigate</p>
        </div>
    </div>
    <script src="componets.js"></script>
    <script>
        const path = window.location.pathname;
        console.log(`User reached 404 at: ${path}`);
    </script>
</body>
</html>
