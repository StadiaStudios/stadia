<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Closed - We've Moved</title>
    
    <style>
        /* Base Dark Mode Styles */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Container Styling */
        .container {
            background-color: #1e1e1e;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }

        /* Typography */
        h1 {
            color: #ffffff;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 16px;
            font-weight: 600;
        }

        p {
            color: #a0a0a0;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* Button Styling */
        .button {
            display: inline-block;
            background-color: #3b82f6; /* Professional Blue */
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 16px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .button:hover {
            background-color: #2563eb;
        }

        .button:active {
            transform: scale(0.98);
        }

        /* Icon (SVG) */
        .icon {
            width: 48px;
            height: 48px;
            color: #6b7280;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>

        <h1>This Website Has Closed</h1>
        <p>Thank you for visiting. This URL is no longer active, but we haven't gone far. All of our tools and content have transitioned to a new home.</p>
        
        <a href="https://www.your-new-url.com" class="button">Visit Our New Website</a>
    </div>

</body>
</html>
